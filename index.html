<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Covvy Media | Global Directory</title>
    <!-- PWA Manifest -->
    <link rel="manifest" href='data:application/json;charset=utf-8,{"name":"Covvy Media","short_name":"Covvy","start_url":"/","display":"standalone","background_color":"#1a73e8","theme_color":"#1a73e8","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%231a73e8%22/%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2215%22 fill=%22white%22/%3E%3C/svg%3E","sizes":"192x192","type":"image/svg+xml"}]}'>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #ffffff; --text-main: #202124; --accent-1: #1a73e8; --border: #dadce0; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; }
        
        nav { padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        nav h2 { font-weight: 900; margin: 0; font-size: 1.8rem; }
        
        /* Install Button Style */
        #install-btn { background: var(--accent-1); color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; display: none; font-weight: bold; }
        
        .hero { padding: 1.5rem 2rem; }
        .search-container { padding: 1rem; position: sticky; top: 0; background: rgba(255, 255, 255, 0.95); z-index: 100; border-bottom: 1px solid var(--border); }
        #searchBar { background: #f1f3f4; border: 1px solid transparent; padding: 12px 20px; width: 100%; max-width: 600px; margin: 0 auto; display: block; border-radius: 50px; outline: none; font-size: 16px; }
        
        #platform-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 1rem; max-width: 800px; margin: auto; }
        .platform-card { background: #f8f9fa; padding: 15px; border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
        
        footer { padding: 2rem; text-align: center; font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 2rem; }
        footer a { color: var(--accent-1); cursor: pointer; text-decoration: underline; margin: 0 10px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: white; margin: 10% auto; padding: 2rem; width: 90%; max-width: 600px; border-radius: 12px; max-height: 80vh; overflow-y: auto; }
        .close-btn { float: right; cursor: pointer; font-size: 1.5rem; }

        @media (max-width: 480px) { #platform-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav>
        <h2>Covvy Media</h2>
        <button id="install-btn">Install App</button>
    </nav>
    
    <div class="hero">
        <p><strong>Your social media apps, in one place!</strong></p>
    </div>

    <div class="search-container">
        <input type="text" id="searchBar" placeholder="Search platforms..." onkeyup="filterPlatforms()">
    </div>

    <main id="platform-container"></main>

    <footer>
        <a onclick="openModal('privacy')">Privacy Policy</a> | 
        <a onclick="openModal('terms')">Terms of Use</a>
        <p>&copy; 2026 Covvy Media.</p>
    </footer>

    <div id="modal" class="modal"><div class="modal-content"><span class="close-btn" onclick="closeModal()">&times;</span><div id="modal-body"></div></div></div>

    <script>
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        installBtn.style.display = 'none';
                    }
                    deferredPrompt = null;
                });
            }
        });

        function openModal(type) {
            const content = {
                privacy: "<h3>Privacy Policy</h3><p>We do not collect personal data.</p>",
                terms: "<h3>Terms of Use</h3><p>This is a directory for your convenience.</p>"
            };
            document.getElementById('modal-body').innerHTML = content[type];
            document.getElementById('modal').style.display = "block";
        }
        function closeModal() { document.getElementById('modal').style.display = "none"; }
        
        const platforms = [{ name: "Facebook", link: "https://facebook.com", icon: "fa-brands fa-facebook", color: "#1877F2" }, { name: "Instagram", link: "https://instagram.com", icon: "fa-brands fa-instagram", color: "#E1306C" }, { name: "WhatsApp", link: "https://wa.me/27824598656", icon: "fa-brands fa-whatsapp", color: "#25D366" }, { name: "YouTube", link: "https://youtube.com", icon: "fa-brands fa-youtube", color: "#FF0000" }, { name: "TikTok", link: "https://tiktok.com", icon: "fa-brands fa-tiktok", color: "#000000" }, { name: "X", link: "https://x.com", icon: "fa-brands fa-x-twitter", color: "#000000" }];

        function renderPlatforms(filter = "") {
            const container = document.getElementById('platform-container');
            container.innerHTML = platforms.filter(p => p.name.toLowerCase().includes(filter.toLowerCase())).map(p => `
                <a href="${p.link}" target="_blank" class="platform-card">
                    <div style="color:${p.color}; font-size:20px"><i class="${p.icon}"></i></div>
                    <div><strong>${p.name}</strong><br><small style="color:var(--accent-1)">Launch &rarr;</small></div>
                </a>`).join('');
        }
        function filterPlatforms() { renderPlatforms(document.getElementById('searchBar').value); }
        renderPlatforms();
    </script>
</body>
</html>
