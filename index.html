<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Covvy World | Global Directory</title>
    
    <!-- Icon: Blue background with white dot -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%231a73e8%22/%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2215%22 fill=%22white%22/%3E%3C/svg%3E">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href='data:application/json;charset=utf-8,{"name":"Covvy World","short_name":"Covvy","start_url":"/","display":"standalone","background_color":"%231a73e8","theme_color":"%231a73e8","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%231a73e8%22/%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2215%22 fill=%22white%22/%3E%3C/svg%3E","sizes":"192x192","type":"image/svg+xml"}]}'>
    
    <style>
        :root { --bg: #ffffff; --accent: #1a73e8; }
        body { font-family: sans-serif; margin: 0; }
        
        /* Popup Modal */
        #pwa-popup { display: none; position: fixed; bottom: 20px; left: 5%; width: 90%; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 1000; text-align: center; }
        .icon-box { width: 50px; height: 50px; background: var(--accent); margin: 0 auto 10px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .dot { width: 15px; height: 15px; background: white; border-radius: 50%; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <nav style="padding: 2rem;"><h2>Covvy World</h2></nav>

    <!-- PWA Installation Popup -->
    <div id="pwa-popup">
        <div class="icon-box"><div class="dot"></div></div>
        <h3>Install Covvy World</h3>
        <p>Add this to your home screen for quick access.</p>
        <button onclick="installPWA()">Add to Home Screen</button>
        <p style="font-size: 12px; margin-top: 10px; color: gray;" onclick="hidePopup()">Maybe later</p>
    </div>

    <script>
        let deferredPrompt;
        const popup = document.getElementById('pwa-popup');

        // Show popup on load if PWA is installable
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            popup.style.display = 'block';
        });

        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    popup.style.display = 'none';
                });
            } else {
                alert("To install: Tap the browser 'Share' or 'Menu' button and select 'Add to Home Screen'.");
            }
        }

        function hidePopup() { popup.style.display = 'none'; }
    </script>
</body>
</html>
