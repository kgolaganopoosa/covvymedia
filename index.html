<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Covvy Media | Global Directory</title>
    <style>
        /* Colourful Modern Theme */
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --accent-1: #3b82f6;
            --accent-2: #8b5cf6;
            --border: #334155;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 0; }
        
        header { padding: 4rem 2rem; text-align: center; background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); }
        header h1 { font-size: 3rem; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }

        .search-container { text-align: center; padding: 2rem; }
        #searchBar { background: #0f172a; border: 2px solid var(--accent-1); padding: 15px; color: white; width: 100%; max-width: 500px; border-radius: 10px; }

        /* Two columns per row */
        #platform-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 2rem; max-width: 800px; margin: auto; }
        
        .platform-card { background: var(--card-bg); padding: 30px; border-radius: 15px; border-left: 5px solid var(--accent-1); transition: 0.3s; }
        .platform-card:hover { border-left-color: var(--accent-2); transform: scale(1.02); }
        .platform-card a { color: var(--accent-1); text-decoration: none; font-weight: bold; }
        
        .fav-btn { cursor: pointer; background: transparent; border: 1px solid var(--accent-2); color: white; padding: 8px 16px; border-radius: 5px; margin-top: 15px; display: block; }
        .fav-btn.active { background: var(--accent-2); }

        footer { padding: 3rem; background: #020617; text-align: center; font-size: 0.85rem; color: #94a3b8; }
    </style>
</head>
<body>

    <header>
        <h1>Covvy Media</h1>
        <p>The colourful hub for your digital world.</p>
    </header>

    <div class="search-container">
        <input type="text" id="searchBar" placeholder="Search platforms..." onkeyup="filterPlatforms()">
    </div>

    <main id="platform-container"></main>

    <footer>
        <div style="max-width: 600px; margin: auto;">
            <h4>Legal Disclosures</h4>
            <p><strong>Privacy:</strong> We use local storage. No data leaves your browser.</p>
            <p><strong>Terms:</strong> Directory links are provided for user convenience.</p>
            <p>&copy; 2026 Covvy Media.</p>
        </div>
    </footer>

    <script>
        const platforms = [
            { name: "Facebook", link: "https://facebook.com" },
            { name: "Instagram", link: "https://instagram.com" },
            { name: "WhatsApp", link: "whatsapp://", isMobileApp: true },
            { name: "YouTube", link: "https://youtube.com" },
            { name: "TikTok", link: "https://tiktok.com" },
            { name: "X (Twitter)", link: "https://x.com" },
            { name: "LinkedIn", link: "https://linkedin.com" },
            { name: "Pinterest", link: "https://pinterest.com" }
        ];

        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        function openPlatform(platform) {
            if (platform.isMobileApp && isMobileDevice()) {
                // Try to open native app on mobile
                window.location.href = platform.link;
                // Fallback to web version after a delay if app doesn't open
                setTimeout(() => {
                    window.location.href = "https://web.whatsapp.com";
                }, 1500);
            } else {
                // Open web version with fallback for WhatsApp on desktop
                const link = platform.name === "WhatsApp" ? "https://web.whatsapp.com" : platform.link;
                window.open(link, '_blank');
            }
        }

        function renderPlatforms(filter = "") {
            const container = document.getElementById('platform-container');
            const favs = JSON.parse(localStorage.getItem('covvy_favs')) || [];
            const filtered = platforms.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
            
            container.innerHTML = filtered.map(p => `
                <div class="platform-card">
                    <h3>${p.name}</h3>
                    <a href="javascript:void(0);" onclick="openPlatform(${JSON.stringify(p)})">Launch App &rarr;</a>
                    <button class="fav-btn ${favs.includes(p.name) ? 'active' : ''}" onclick="toggleFav('${p.name}')">
                        ${favs.includes(p.name) ? 'Favorited' : 'Add to Favorites'}
                    </button>
                </div>
            `).join('');
        }

        function filterPlatforms() { renderPlatforms(document.getElementById('searchBar').value); }

        function toggleFav(name) {
            let favs = JSON.parse(localStorage.getItem('covvy_favs')) || [];
            if (favs.includes(name)) favs = favs.filter(i => i !== name);
            else favs.push(name);
            localStorage.setItem('covvy_favs', JSON.stringify(favs));
            renderPlatforms(document.getElementById('searchBar').value);
        }

        renderPlatforms();
    </script>
</body>
</html>
