<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Covvy Media</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; background: #f8f9fa; color: #202124; }
        nav { padding: 16px 20px; background: white; border-bottom: 1px solid #dadce0; display: flex; align-items: center; }
        .logo { font-weight: bold; font-size: 20px; color: black; }
        .hero { text-align: center; padding: 40px 20px; }
        #list { max-width: 500px; margin: 0 auto; list-style: none; padding: 0 10px; }
        .item { background: white; margin: 8px 0; padding: 12px 16px; display: flex; align-items: center; border-radius: 8px; border: 1px solid #dadce0; }
        .icon { font-size: 24px; margin-right: 15px; min-width: 30px; text-align: center; }
        .name { flex-grow: 1; font-weight: 500; }
        .btn { 
            padding: 8px 16px; 
            cursor: pointer; 
            border: none; 
            border-radius: 4px; 
            background: #1a73e8; 
            color: white; 
            text-decoration: none; 
            font-size: 14px;
            font-weight: 600;
        }
        .btn:hover { background: #1557b0; }
        #installBtn { margin-top: 15px; padding: 10px 25px; font-size: 16px; }
    </style>
</head>
<body>

<nav><div class="logo">Covvy Media</div></nav>

<div class="hero">
    <h1>Your social media platforms, in one place!</h1>
    <button id="installBtn" class="btn" style="display:none;">Install Covvy Media</button>
</div>

<ul id="list"></ul>

<script>
    const platforms = [
        { name: "WhatsApp", url: "https://wa.me/27824598656", icon: "💬" },
        { name: "Facebook", url: "https://facebook.com", icon: "👥" },
        { name: "Instagram", url: "https://instagram.com", icon: "📸" },
        { name: "TikTok", url: "https://tiktok.com", icon: "🎵" },
        { name: "YouTube", url: "https://youtube.com", icon: "▶️" },
        { name: "X", url: "https://x.com", icon: "🐦" },
        { name: "LinkedIn", url: "https://linkedin.com", icon: "💼" },
        { name: "Reddit", url: "https://reddit.com", icon: "👽" },
        { name: "Snapchat", url: "https://snapchat.com", icon: "👻" },
        { name: "Pinterest", url: "https://pinterest.com", icon: "📌" }
    ];

    const list = document.getElementById('list');
    platforms.forEach(p => {
        const li = document.createElement('li');
        li.className = 'item';
        li.innerHTML = `
            <div class="icon">${p.icon}</div>
            <span class="name">${p.name}</span>
            <a href="${p.url}" target="_blank" class="btn">Launch App</a>
        `;
        list.appendChild(li);
    });

    // PWA Install Logic
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'inline-block';
    });

    document.getElementById('installBtn').addEventListener('click', () => {
        deferredPrompt.prompt();
    });

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
</script>
</body>
</html>
