<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Covvy Media | Your Social World</title>
    <style>
        /* Modern Youthful CSS */
        :root {
            --primary: #6366f1;
            --accent: #f43f5e;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
        header { padding: 4rem 1rem; text-align: center; background: linear-gradient(135deg, var(--primary), var(--accent)); }
        header h1 { font-size: 3rem; margin: 0; }
        
        #platform-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 2rem; max-width: 1200px; margin: auto; }
        
        .platform-card { background: var(--card); padding: 1.5rem; border-radius: 1rem; text-align: center; transition: 0.3s; border: 1px solid #334155; }
        .platform-card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .platform-card a { display: block; color: var(--primary); text-decoration: none; font-weight: bold; margin: 10px 0; }
        
        .fav-btn { cursor: pointer; padding: 8px 16px; border-radius: 20px; border: none; background: #334155; color: white; transition: 0.2s; }
        .fav-btn.active { background: var(--accent); }

        footer { text-align: center; padding: 3rem; font-size: 0.9rem; border-top: 1px solid #1e293b; margin-top: 2rem; }
        footer a { color: #94a3b8; text-decoration: none; margin: 0 10px; }
        footer a:hover { color: var(--text); }
    </style>
</head>
<body>

    <header>
        <h1>Covvy Media</h1>
        <p>Explore the world's most popular platforms in one place.</p>
    </header>

    <main id="platform-container"></main>

    <footer>
        <div>
            <a href="#">Privacy Policy</a> | 
            <a href="#">Terms of Use</a> | 
            <a href="#">Terms & Conditions</a>
        </div>
        <p>&copy; 2026 Covvy Media. Built for the connected generation.</p>
    </footer>

    <script>
        const platforms = [
            { name: "Facebook", link: "https://facebook.com" },
            { name: "YouTube", link: "https://youtube.com" },
            { name: "WhatsApp", link: "https://web.whatsapp.com" },
            { name: "Instagram", link: "https://instagram.com" },
            { name: "TikTok", link: "https://tiktok.com" },
            { name: "Snapchat", link: "https://snapchat.com" },
            { name: "X (Twitter)", link: "https://x.com" },
            { name: "Pinterest", link: "https://pinterest.com" },
            { name: "Reddit", link: "https://reddit.com" },
            { name: "LinkedIn", link: "https://linkedin.com" }
        ];

        const container = document.getElementById('platform-container');

        function renderPlatforms() {
            const favs = JSON.parse(localStorage.getItem('covvy_favs')) || [];
            container.innerHTML = platforms.map(p => `
                <div class="platform-card">
                    <h3>${p.name}</h3>
                    <a href="${p.link}" target="_blank">Launch App</a>
                    <button class="fav-btn ${favs.includes(p.name) ? 'active' : ''}" onclick="toggleFav('${p.name}')">
                        ${favs.includes(p.name) ? '♥ Favorited' : '♡ Add Favorite'}
                    </button>
                </div>
            `).join('');
        }

        function toggleFav(name) {
            let favs = JSON.parse(localStorage.getItem('covvy_favs')) || [];
            if (favs.includes(name)) {
                favs = favs.filter(item => item !== name);
            } else {
                favs.push(name);
            }
            localStorage.setItem('covvy_favs', JSON.stringify(favs));
            renderPlatforms();
        }

        renderPlatforms();
    </script>
</body>
</html>
