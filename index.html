<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Covvy Media | All-in-One</title>
    <link rel="manifest" href="manifest.json">
    <!-- Google Font for a modern, youthful look -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #d946ef;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.07);
            --text: #f1f5f9;
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            margin: 0; 
            background-color: var(--bg); 
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
        }

        nav { padding: 30px 20px; text-align: center; font-size: 28px; font-weight: 700; }

        .hero { text-align: center; padding: 20px 20px 40px; }
        .hero h1 { 
            font-size: 2rem; 
            margin-bottom: 20px; 
            background: linear-gradient(to right, var(--primary), var(--accent)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        #list { max-width: 450px; margin: 0 auto; list-style: none; padding: 0 20px; flex: 1; }
        
        .item { 
            background: var(--card-bg); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 14px 0; 
            padding: 16px 20px; 
            display: flex; 
            align-items: center; 
            border-radius: 20px; 
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .item:hover { transform: scale(1.02); background: rgba(255, 255, 255, 0.12); }

        .icon-container { width: 40px; height: 40px; margin-right: 15px; display: flex; align-items: center; justify-content: center; }
        .icon-container svg { width: 28px; height: 28px; fill: white; }

        .name { flex-grow: 1; font-weight: 600; font-size: 1.1rem; }

        .btn { 
            padding: 10px 20px; cursor: pointer; border: none; border-radius: 50px; 
            background: linear-gradient(135deg, var(--primary), var(--accent)); 
            color: white; text-decoration: none; font-size: 14px; font-weight: 700;
            transition: opacity 0.3s;
        }
        .btn:hover { opacity: 0.9; }

        footer { padding: 40px 20px; text-align: center; font-size: 12px; color: #64748b; }
        footer a { color: var(--primary); text-decoration: none; margin: 0 10px; cursor: pointer; font-weight: 700; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; backdrop-filter: blur(5px); }
        .modal-content { 
            background: #1e293b; color: white; margin: 15% auto; padding: 30px; 
            width: 80%; max-width: 400px; border-radius: 24px; text-align: center;
        }
    </style>
</head>
<body>

<nav>Covvy Media</nav>

<div class="hero">
    <h1>Your Social Hub</h1>
    <button id="installBtn" class="btn" style="display:none;">Add to Home Screen</button>
</div>

<ul id="list"></ul>

<footer>
    <p>&copy; 2026 Covvy Media</p>
    <p>
        <a onclick="showModal('privacy')">Privacy</a> | 
        <a onclick="showModal('terms')">Terms</a>
    </p>
</footer>

<div id="modal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 id="modalTitle"></h2>
        <p id="modalBody" style="line-height: 1.6;"></p>
        <button class="btn" onclick="closeModal()" style="width: 100%; margin-top: 20px;">Close</button>
    </div>
</div>

    ];

    const list = document.getElementById('list');
    platforms.forEach(p => {
        const li = document.createElement('li');
        li.className = 'item';
        li.innerHTML = `
            <div class="icon-container" style="color: ${p.color}">${p.svg}</div>
            <span class="name">${p.name}</span>
            <a href="${p.url}" target="_blank" class="btn">Launch</a>
        `;
        list.appendChild(li);
    });

    const content = {
        privacy: { title: "Privacy Policy", body: "We respect your privacy. Covvy Media is a client-side tool and does not track or store your personal user data." },
        terms: { title: "Terms of Use", body: "This is a simple directory hub. We are not affiliated with the social media platforms listed here." }
    };

    function showModal(type) {
        document.getElementById('modalTitle').innerText = content[type].title;
        document.getElementById('modalBody').innerText = content[type].body;
        document.getElementById('modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'inline-block';
    });

    document.getElementById('installBtn').addEventListener('click', () => {
        deferredPrompt.prompt();
    });
</script>
</body>
</html>
