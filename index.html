<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Covvy Media</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; background: #f8f9fa; color: #202124; display: flex; flex-direction: column; min-height: 100vh; }
        nav { padding: 16px 20px; background: white; border-bottom: 1px solid #dadce0; }
        .logo { font-weight: bold; font-size: 20px; color: black; }
        .hero { text-align: center; padding: 40px 20px; }
        #list { max-width: 500px; margin: 0 auto; list-style: none; padding: 0 10px; flex: 1; }
        .item { background: white; margin: 8px 0; padding: 12px 16px; display: flex; align-items: center; border-radius: 8px; border: 1px solid #dadce0; }
        .icon-container { width: 30px; height: 30px; margin-right: 15px; display: flex; align-items: center; justify-content: center; }
        .icon-container svg { width: 24px; height: 24px; }
        .name { flex-grow: 1; font-weight: 500; }
        .btn { padding: 8px 16px; cursor: pointer; border: none; border-radius: 4px; background: #1a73e8; color: white; text-decoration: none; font-size: 14px; font-weight: 600; }
        .btn:hover { background: #1557b0; }
        footer { background: #fff; padding: 20px; text-align: center; border-top: 1px solid #dadce0; margin-top: 40px; font-size: 12px; color: #70757a; }
        footer a { color: #1a73e8; text-decoration: none; margin: 0 10px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; }
        .modal-content { background: white; margin: 10% auto; padding: 20px; width: 80%; max-width: 500px; border-radius: 8px; max-height: 70vh; overflow-y: auto; }
    </style>
</head>
<body>

<nav><div class="logo">Covvy Media</div></nav>

<div class="hero">
    <h1>Your social media platforms, in one place!</h1>
    <button id="installBtn" class="btn" style="display:none;">Install Covvy Media</button>
</div>

<ul id="list"></ul>

<footer>
    <p>&copy; 2026 Covvy Media. All rights reserved.</p>
    <p>
        <a onclick="showModal('privacy')">Privacy Policy</a> | 
        <a onclick="showModal('terms')">Terms of Use</a> | 
        <a onclick="showModal('conditions')">Terms & Conditions</a>
    </p>
</footer>

<div id="modal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 id="modalTitle"></h2>
        <p id="modalBody"></p>
        <button class="btn" onclick="closeModal()">Close</button>
    </div>
</div>

    ];

    const list = document.getElementById('list');
    platforms.forEach(p => {
        const li = document.createElement('li');
        li.className = 'item';
        li.innerHTML = `
            <div class="icon-container" style="color: ${p.color}">${p.svg}</div>
            <span class="name">${p.name}</span>
            <a href="${p.url}" target="_blank" class="btn">Launch App</a>
        `;
        list.appendChild(li);
    });

    const content = {
        privacy: { title: "Privacy Policy", body: "Covvy Media is a client-side directory. We do not store, track, or collect your personal data. All preferences are saved locally to your device browser." },
        terms: { title: "Terms of Use", body: "By using this tool, you agree that Covvy Media is a directory hub. We are not responsible for the privacy practices or content of the third-party platforms linked." },
        conditions: { title: "Terms & Conditions", body: "This service is provided 'as is'. We reserve the right to modify, add, or remove links at any time to ensure the quality of the directory." }
    };

    function showModal(type) {
        document.getElementById('modalTitle').innerText = content[type].title;
        document.getElementById('modalBody').innerText = content[type].body;
        document.getElementById('modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'inline-block';
    });

    document.getElementById('installBtn').addEventListener('click', () => {
        deferredPrompt.prompt();
    });
</script>
</body>
</html>
